name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, pinned
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  leak-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: No secrets
        run: |
          # warden is a filesystem-policy tool, so example /Users/... and /home/...
          # paths are legitimate and are NOT scanned. Generic secret indicators
          # only. Maintainer-identity and stale-brand scrubbing runs in the
          # private publish tooling before anything is pushed here; enumerating
          # those identifiers in this public file would itself disclose them.
          if grep -rniE 'BEGIN [A-Z ]*PRIVATE KEY|AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{20}' \
               --exclude-dir=.git --exclude-dir=target .; then
            echo "::error::leak guard found a private key or API token"
            exit 1
          fi
          echo "leak guard clean"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, pinned
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies for security advisories
        # Fails on known vulnerabilities; unmaintained/yanked crates are reported
        # as warnings only (non-blocking). Tune with an audit.toml if needed.
        run: cargo audit
