name: cla

# Contributor License Agreement gate. A contributor comments
# "I have read the CLA Document and I hereby sign the CLA" on their PR; the
# action records the signature on the `cla-signatures` branch and blocks merge
# until signed. See CONTRIBUTING.md.
#
# MANUAL SETUP (one-time, by the maintainer):
#   1. Create a branch named `cla-signatures` in this repo (can be empty).
#   2. Add a repo secret `CLA_SIGNATURES_TOKEN`: a fine-grained PAT with
#      contents:read/write, pull-requests:read/write, issues:read/write.
#   3. The CLA text is at docs/CLA.md (referenced below).

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/teflon07/memkeeper-warden/blob/main/docs/CLA.md"
          branch: "cla-signatures"
          allowlist: "dependabot[bot]"
